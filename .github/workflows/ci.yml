name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run syntax
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run check
      - run: npm run coverage
      - run: npm run check:performance
